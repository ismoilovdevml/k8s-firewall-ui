name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binaries
        run: |
          mkdir -p dist
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS=${platform%/*} GOARCH=${platform#*/} CGO_ENABLED=0 go build \
              -ldflags "-s -w -X github.com/ismoilovdevml/k8s-firewall-ui/internal/version.Version=${GITHUB_REF_NAME}" \
              -o k8s-firewall-ui ./cmd/k8s-firewall-ui
            tar -czf "dist/k8s-firewall-ui_${GITHUB_REF_NAME}_${platform%/*}_${platform#*/}.tar.gz" \
              k8s-firewall-ui LICENSE README.md
            rm k8s-firewall-ui
          done
      - uses: azure/setup-helm@v4
      - name: Package Helm chart
        run: |
          helm package deploy/helm/k8s-firewall-ui \
            --version "${GITHUB_REF_NAME#v}" \
            --app-version "${GITHUB_REF_NAME#v}" \
            --destination dist
      - name: Checksums
        working-directory: dist
        run: sha256sum * > checksums.txt
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
