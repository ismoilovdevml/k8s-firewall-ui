apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-firewall-ui.fullname" . }}
  labels:
    {{- include "k8s-firewall-ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{- include "k8s-firewall-ui.selectorLabels" . | nindent 4 }}
