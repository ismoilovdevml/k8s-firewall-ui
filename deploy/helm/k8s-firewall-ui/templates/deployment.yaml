apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-firewall-ui.fullname" . }}
  labels:
    {{- include "k8s-firewall-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s-firewall-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-firewall-ui.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "k8s-firewall-ui.fullname" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: k8s-firewall-ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --listen=:8080
            {{- if .Values.readOnly }}
            - --read-only
            {{- end }}
            {{- with .Values.cniOverride }}
            - --cni-override={{ . }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
