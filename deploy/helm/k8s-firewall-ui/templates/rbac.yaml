apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-firewall-ui.fullname" . }}
  labels:
    {{- include "k8s-firewall-ui.labels" . | nindent 4 }}
rules:
  # Read path: topology, pickers, policy views (informers watch these).
  - apiGroups: [""]
    resources: ["pods", "namespaces", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  {{- if not .Values.readOnly }}
  # Write path: policy management.
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "update", "patch", "delete"]
  {{- end }}
  # CNI detection: kube-system DaemonSets + API group discovery.
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-firewall-ui.fullname" . }}
  labels:
    {{- include "k8s-firewall-ui.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-firewall-ui.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-firewall-ui.fullname" . }}
    namespace: {{ .Release.Namespace }}
